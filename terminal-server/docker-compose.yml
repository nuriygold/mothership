version: '3.9'

services:
  terminal-server:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3001
      - TERMINAL_SECRET=${TERMINAL_SECRET}
      - TERMINAL_COMMAND=${TERMINAL_COMMAND:-claude}
      - SESSION_TTL_MS=${SESSION_TTL_MS:-3600000}
      # Pass the Anthropic API key so the claude CLI can authenticate
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      # Persist claude CLI auth between container restarts
      - claude-config:/root/.config/anthropic
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  claude-config:
