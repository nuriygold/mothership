# Nginx config for terminal-server WSS proxy.
# Place at /etc/nginx/sites-available/terminal-server and symlink to sites-enabled/.
# Replace YOURDOMAIN with the actual hostname (e.g. terminal.nuriy.com).
# Certbot will rewrite the 80→443 redirect and fill in ssl_certificate paths.

server {
    listen 80;
    server_name YOURDOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOURDOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Health check — plain HTTP
    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_set_header Host $host;
    }

    # WebSocket upgrade
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
