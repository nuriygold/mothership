kind = "web"
previewPath = "/"
title = "Mothership"
version = "1.0.0"
id = "artifacts/mothership"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24076

[services.development]
run = "pnpm --filter @workspace/mothership run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mothership", "run", "build" ]
publicDir = "artifacts/mothership/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24076"
BASE_PATH = "/"
